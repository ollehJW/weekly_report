<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>주간 업무 리포트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10162B; --ink-soft:#3A4568; --muted:#7A87A6;
    --line:#E2E7F1; --line-soft:#EEF1F7;
    --page:#EEF1F8; --surface:#FFFFFF; --navy:#0C1631;
    --accent:#2451C4; --accent-soft:#EAF0FF;
    --red:#C43D2E; --red-soft:#FBEAE7;
    --amber:#B8801A; --amber-soft:#FBF3E2;
    --green:#1F8A5F; --green-soft:#E7F5EE;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--page);color:var(--ink);font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;line-height:1.6;padding:40px 20px;-webkit-font-smoothing:antialiased;}
  .mono{font-family:"JetBrains Mono","Pretendard",monospace;}
  .sheet{max-width:1000px;margin:0 auto;background:var(--surface);border:1px solid var(--line);box-shadow:0 24px 60px -20px rgba(12,22,49,.18);overflow:hidden;}
  .head{background:radial-gradient(900px 260px at 100% -40%, rgba(36,81,196,.35), transparent 60%),var(--navy);color:#fff;padding:36px 40px 28px;position:relative;}
  .head::after{content:"";position:absolute;inset:auto 0 0 0;height:1px;background:linear-gradient(90deg, rgba(255,255,255,.02), rgba(255,255,255,.28), rgba(255,255,255,.02));}
  .head h1{margin:0 0 22px;font-size:30px;font-weight:700;letter-spacing:0;color:#fff;}
  .meta-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:2px;}
  .meta-item{display:flex;align-items:baseline;gap:8px;border-left:2px solid #5C8AE6;padding:2px 0 2px 12px;}
  .meta-item .k{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.1em;color:#8fa4d6;text-transform:uppercase;}
  .meta-item .v{font-size:14px;font-weight:600;color:#fff;}
  .body{display:grid;gap:26px;padding:34px 40px 30px;}
  .project{border:1px solid var(--line);}
  .project-title{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 20px;background:#F8F9FD;border-bottom:1px solid var(--line);}
  .project-title .name{display:flex;align-items:center;gap:10px;min-width:0;}
  .project-title h2{margin:0;font-size:17px;font-weight:700;letter-spacing:0;word-break:keep-all;overflow-wrap:anywhere;}
  .project-title .stats{display:flex;gap:14px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
  .project-title .stats b{color:var(--ink-soft);font-weight:700;}
  .blocks{display:grid;grid-template-columns:1fr;}
  .block{min-width:0;padding:18px 20px;border-bottom:1px solid var(--line-soft);}
  .block:last-child{border-bottom:0;}
  .block h3{display:flex;align-items:center;gap:8px;margin:0 0 14px;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-soft);}
  .block h3 .bar{width:12px;height:3px;background:var(--accent);}
  .block.risk h3 .bar{background:var(--red);}
  .block.plan h3 .bar{background:var(--green);}
  ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px;}
  .plog{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#FAFBFE;border:1px solid var(--line-soft);}
  .plog .num{font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;color:#A9B4CC;padding-top:1px;flex-shrink:0;}
  .plog .txt{font-size:13px;color:#263348;word-break:keep-all;overflow-wrap:anywhere;white-space:pre-wrap;}
  .rline{display:flex;align-items:center;gap:12px;padding:11px 12px;background:#FAFBFE;border:1px solid var(--line-soft);border-left:3px solid var(--line);}
  .rline.high{border-left-color:var(--red);}
  .rline.mid{border-left-color:var(--amber);}
  .rline.low{border-left-color:var(--green);}
  .badge{display:inline-flex;align-items:center;gap:5px;flex-shrink:0;padding:4px 10px 4px 8px;border-radius:999px;font-size:11px;font-weight:700;font-family:"JetBrains Mono",monospace;letter-spacing:.02em;}
  .badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;}
  .badge.high{background:var(--red-soft);color:var(--red);}
  .badge.mid{background:var(--amber-soft);color:var(--amber);}
  .badge.low{background:var(--green-soft);color:var(--green);}
  .rtxt{font-size:13px;color:#263348;word-break:keep-all;overflow-wrap:anywhere;white-space:pre-wrap;}
  .pline{display:flex;align-items:center;gap:12px;padding:11px 12px;background:#FAFBFE;border:1px solid var(--line-soft);}
  .due{display:inline-flex;align-items:center;gap:6px;flex-shrink:0;padding:4px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.02em;white-space:nowrap;}
  .due::before{content:"";width:6px;height:6px;background:currentColor;}
  .pdate{display:inline-flex;align-items:center;gap:6px;flex-shrink:0;padding:4px 10px;border-radius:999px;background:#F1F4FA;color:#465474;font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.02em;white-space:nowrap;}
  .pdate::before{content:"";width:6px;height:6px;background:currentColor;}
  .status{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;min-width:92px;padding:4px 10px;border-radius:999px;font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.02em;white-space:nowrap;}
  .status.done{background:var(--green-soft);color:var(--green);}
  .status.in-progress{background:var(--amber-soft);color:var(--amber);}
  .ptxt{font-size:13px;color:#263348;word-break:keep-all;overflow-wrap:anywhere;white-space:pre-wrap;flex:1;min-width:0;}
  .empty{border:1px dashed #D5DCE8;background:#FAFBFE;color:var(--muted);padding:14px;font-size:13px;}
  .footer{display:flex;align-items:center;justify-content:space-between;padding:16px 40px 26px;border-top:1px solid var(--line-soft);color:var(--muted);font-size:11px;font-family:"JetBrains Mono",monospace;letter-spacing:.02em;}
  .footer .stamp{display:flex;align-items:center;gap:6px;}
  .footer .stamp .sq{width:6px;height:6px;background:#B9C3DA;}
  @media (max-width:820px){body{padding:16px;}.head,.body{padding:24px;}.footer{padding:16px 24px 22px;flex-direction:column;align-items:flex-start;gap:6px;}.project-title{align-items:flex-start;flex-direction:column;}.project-title .stats{white-space:normal;}.blocks{grid-template-columns:1fr;}.block{border-right:0;border-bottom:1px solid var(--line-soft);}.block:last-child{border-bottom:0;}}
  @media (max-width:420px){.rline,.pline{align-items:flex-start;flex-direction:column;}.status{min-width:0;}}
  @media print{body{background:#fff;padding:0;}.sheet{box-shadow:none;border:none;max-width:none;}}
</style>
</head>
<body>
  <main class="sheet">
    <header class="head">
      <h1>주간 업무 리포트</h1>
      <div class="meta-row">
        <div class="meta-item"><span class="k">작성자</span><span class="v">$author_role</span></div>
        <div class="meta-item"><span class="k">업무 기간</span><span class="v">$period</span></div>
      </div>
    </header>
    <section class="body">
      $project_sections
    </section>
    <footer class="footer">
      <div class="stamp"><span class="sq"></span>Generated from WiaReport</div>
    </footer>
  </main>
</body>
</html>
